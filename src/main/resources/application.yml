spring:
  application:
    name: jonggu-restaurant-api
  profiles:
    default: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Seoul

server:
  port: ${JONGGU_SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${JONGGU_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}
  google-sheets:
    credentials-path: ${GOOGLE_CREDENTIALS_PATH:}
    spreadsheet-id: ${GOOGLE_SHEETS_ID:}
    ingredient-sheet-gid: ${GOOGLE_SHEETS_INGREDIENT_GID:}
    ingredient-sheet-name: ${GOOGLE_SHEETS_INGREDIENT_SHEET_NAME:재료}
    recipe-sheet-gid: ${GOOGLE_SHEETS_RECIPE_GID:}
    recipe-sheet-name: ${GOOGLE_SHEETS_RECIPE_SHEET_NAME:레시피}
    refresh-cron: ${GOOGLE_SHEETS_REFRESH_CRON:2 6 * * * *}
