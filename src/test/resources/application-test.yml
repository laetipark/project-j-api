spring:
  datasource:
    url: jdbc:h2:mem:jonggu_restaurant;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  jackson:
    time-zone: Asia/Seoul

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
